name: Build Native Binaries

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # Job to provide the version string to other jobs
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get_version
        run: |
          VERSION=$(grep "^jjVersion =" gradle.properties | cut -d'=' -f2 | xargs)
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION-$SHA" >> $GITHUB_OUTPUT

  Linux64:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Build
        run: ./gradlew nativesJarLinux64ReleaseDp jar zipJoltHeaders -Ptarget=Linux64 --console=plain
      - name: Prepare Artifact
        run: |
          mkdir dist
          find build/libs -name "*.so" -exec cp {} dist/joltjni-${{ needs.prepare.outputs.version }}-linux-x64-ReleaseDp.so \;
          find build/libs -name "*.jar" -exec cp {} dist/jolt-jni-${{ needs.prepare.outputs.version }}.jar \;
          find build/libs -name "jolt-headers-*.zip" -exec cp {} dist/jolt-headers-${{ needs.prepare.outputs.version }}.zip \;
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: joltjni-linux-x64
          path: dist/*

  # Linux ARM64 build using cross-compiler
  Linux_ARM64:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt install -y g++-10-aarch64-linux-gnu
      - name: Build
        run: ./gradlew nativesJarLinux_ARM64ReleaseDp -Ptarget=Linux_ARM64 --console=plain
      - name: Prepare Artifact
        run: |
          mkdir dist
          find build/libs -name "*.so" -exec cp {} dist/joltjni-${{ needs.prepare.outputs.version }}-linux-arm64-ReleaseDp.so \;
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: joltjni-linux-arm64
          path: dist/*

  # MacOS x86_64 build (Intel)
  MacOSX64:
    needs: prepare
    runs-on: macos-14 # Using Apple Silicon runner to cross-compile for Intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Build
        run: ./gradlew nativesJarMacOSX64ReleaseDp -Ptarget=MacOSX64 --console=plain
      - name: Prepare Artifact
        run: |
          mkdir dist
          find build/libs -name "*.dylib" -exec cp {} dist/joltjni-${{ needs.prepare.outputs.version }}-macos-x64-ReleaseDp.dylib \;
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: joltjni-macos-x64
          path: dist/*

  # MacOS ARM64 build (Apple Silicon)
  MacOSX_ARM64:
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Build
        run: ./gradlew nativesJarMacOSX_ARM64ReleaseDp -Ptarget=MacOSX_ARM64 --console=plain
      - name: Prepare Artifact
        run: |
          mkdir dist
          find build/libs -name "*.dylib" -exec cp {} dist/joltjni-${{ needs.prepare.outputs.version }}-macos-arm64-ReleaseDp.dylib \;
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: joltjni-macos-arm64
          path: dist/*

  # Windows x86_64 build
  Windows64:
    needs: prepare
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Build
        run: ./gradlew nativesJarWindows64ReleaseDp -Ptarget=Windows64 --console=plain
        shell: bash
      - name: Prepare Artifact
        run: |
          mkdir dist
          find build/libs -name "*.dll" -exec cp {} dist/joltjni-${{ needs.prepare.outputs.version }}-windows-x64-ReleaseDp.dll \;
          find build/libs -name "*.lib" -exec cp {} dist/joltjni-${{ needs.prepare.outputs.version }}-windows-x64-ReleaseDp.lib \;
        shell: bash
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: joltjni-windows-x64
          path: dist/*

  # Final job to collect all artifacts and create a stable release
  release:
    name: Create Stable Release
    needs: [prepare, Linux64, Linux_ARM64, MacOSX64, MacOSX_ARM64, Windows64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true # Flattens all artifacts into the 'release' directory

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            Automated release for version ${{ needs.prepare.outputs.version }}.
            All binaries are Double Precision and include core symbols.
          files: release/*
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}